<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cellular Automaton Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Cellular Automaton Generator</h1>

  <form id="ca-form">
    <label for="rule-input">Rule:</label>
    <input type="number" id="rule-input" name="rule" min="1" max="256" value="110">

    <label for="steps-input">Steps:</label>
    <input type="number" id="steps-input" name="steps" min="1" max="10000" value="100">
    <div class="start-button">
        <span class="start-text">Start</span>
    </div>
    <button type="submit">Generate</button>
  </form>

  <!-- This container will center the canvas and hide horizontal overflow -->
  <div class="canvas-container">
    <canvas id="ca-canvas"></canvas>
  </div>


  <script src="script.js"></script>
</body>
</html>
